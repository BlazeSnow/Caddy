name: Build and Publish Caddy Plugins

on:
  push:
    branches:
    - main
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建所有插件镜像，忽略版本缓存。'
        required: true
        default: 'false'
  schedule:
  - cron: "0 17 * * *"

permissions:
  actions: write
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
        - name: cloudflare
          context: github.com/caddy-dns/cloudflare
        - name: webdav
          context: github.com/mholt/caddy-webdav
        - name: tencentcloud
          context: github.com/caddy-dns/tencentcloud
        - name: edgeone
          context: github.com/caddy-dns/edgeone
        - name: alidns
          context: github.com/caddy-dns/alidns
        - name: huaweicloud
          context: github.com/caddy-dns/huaweicloud
        - name: azure
          context: github.com/caddy-dns/azure
        - name: cloudns
          context: github.com/caddy-dns/cloudns
        - name: route53
          context: github.com/caddy-dns/route53
        - name: duckdns
          context: github.com/caddy-dns/duckdns
        - name: porkbun
          context: github.com/caddy-dns/porkbun
        - name: acmedns
          context: github.com/caddy-dns/acmedns
        - name: digitalocean
          context: github.com/caddy-dns/digitalocean
        - name: hetzner
          context: github.com/caddy-dns/hetzner
        - name: ovh
          context: github.com/caddy-dns/ovh
        - name: desec
          context: github.com/caddy-dns/desec
        - name: ionos
          context: github.com/caddy-dns/ionos
        - name: rfc2136
          context: github.com/caddy-dns/rfc2136
        - name: powerdns
          context: github.com/caddy-dns/powerdns
        - name: netcup
          context: github.com/caddy-dns/netcup
        - name: inwx
          context: github.com/caddy-dns/inwx
        - name: googleclouddns
          context: github.com/caddy-dns/googleclouddns
        - name: gandi
          context: github.com/caddy-dns/gandi
        - name: netlify
          context: github.com/caddy-dns/netlify
        - name: godaddy
          context: github.com/caddy-dns/godaddy

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up golang
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'

    - name: Get versions
      run: |
        CADDY_VERSION=$(go list -m -json github.com/caddyserver/caddy/v2@latest | jq -r '.Version')
        PLUGIN_VERSION=$(go list -m -json ${{ matrix.context }}@latest | jq -r '.Version')
        echo "CADDY_VERSION=$CADDY_VERSION" >> $GITHUB_ENV
        echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> $GITHUB_ENV

    - name: Restore build marker
      id: caddy-cache
      uses: actions/cache/restore@v5
      with:
        path: .build-cache/${{ matrix.name }}/caddy
        key: caddy-${{ matrix.name }}-${{ env.CADDY_VERSION }}

    - name: Restore plugin marker
      id: plugin-cache
      uses: actions/cache/restore@v5
      with:
        path: .build-cache/${{ matrix.name }}/plugin
        key: caddy-${{ matrix.name }}-plugin-${{ env.PLUGIN_VERSION }}

    - name: Check if build needed
      run: |
        echo "Caddy 版本：${{ env.CADDY_VERSION }}"
        echo "插件版本：${{ env.PLUGIN_VERSION }}"
        echo "Caddy 缓存命中：${{ steps.caddy-cache.outputs.cache-hit }}"
        echo "插件缓存命中：${{ steps.plugin-cache.outputs.cache-hit }}"

        if [ "${{ github.event.inputs.force_build }}" = "true" ] ; then
          echo "强制构建"
          echo "should_build=true" >> $GITHUB_ENV
        elif [ "${{ steps.caddy-cache.outputs.cache-hit }}" = "true" ] && [ "${{ steps.plugin-cache.outputs.cache-hit }}" = "true" ] ; then
          echo "跳过构建"
          echo "should_build=false" >> $GITHUB_ENV
        else
          echo "需要构建"
          echo "should_build=true" >> $GITHUB_ENV
        fi

    - name: Install xcaddy
      if: env.should_build == 'true'
      run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

    - name: Build Caddy binaries
      if: env.should_build == 'true'
      env:
        PLUGIN: ${{ matrix.context }}
      run: |
        set -eu

        mkdir -p dist/linux_amd64 dist/linux_arm64

        for arch in amd64 arm64 ; do
          echo "构建 Caddy ${CADDY_VERSION} + ${PLUGIN}@${PLUGIN_VERSION} for linux/${arch}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${arch} xcaddy build "${CADDY_VERSION}" \
            --with "${PLUGIN}@${PLUGIN_VERSION}" \
            --output "dist/linux_${arch}/caddy"
          chmod +x "dist/linux_${arch}/caddy"
        done

    - name: Login to Docker Hub
      if: env.should_build == 'true'
      uses: docker/login-action@v3
      with:
        username: blazesnow
        password: ${{ secrets.TOKEN }}

    - name: Login to GitHub
      if: env.should_build == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      if: env.should_build == 'true'
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: env.should_build == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      if: env.should_build == 'true'
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          blazesnow/caddy:${{ matrix.name }}-alpine
          blazesnow/caddy:${{ matrix.name }}
          ghcr.io/blazesnow/caddy:${{ matrix.name }}-alpine
          ghcr.io/blazesnow/caddy:${{ matrix.name }}

    - name: Create build marker
      if: env.should_build == 'true'
      run: |
        mkdir -p .build-cache/${{ matrix.name }}/caddy .build-cache/${{ matrix.name }}/plugin
        echo "${{ env.CADDY_VERSION }}" > .build-cache/${{ matrix.name }}/caddy/version
        echo "${{ env.PLUGIN_VERSION }}" > .build-cache/${{ matrix.name }}/plugin/version

    - name: Save Caddy marker
      if: env.should_build == 'true' && steps.caddy-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: .build-cache/${{ matrix.name }}/caddy
        key: caddy-${{ matrix.name }}-${{ env.CADDY_VERSION }}

    - name: Save plugin marker
      if: env.should_build == 'true' && steps.plugin-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: .build-cache/${{ matrix.name }}/plugin
        key: caddy-${{ matrix.name }}-plugin-${{ env.PLUGIN_VERSION }}
